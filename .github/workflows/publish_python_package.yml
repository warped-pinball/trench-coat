name: Publish Python Package

on:
  release:
    types: [created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    # The version lives only in src/__init__.py (pyproject.toml reads it
    # dynamically). The release tag must match it so PyPI and GitHub agree.
    - name: Check release tag matches package version
      run: |
        PKG_VERSION=$(python -c "from src import __version__; print(__version__)")
        TAG="${GITHUB_REF_NAME#v}"
        echo "package: $PKG_VERSION  tag: $TAG"
        test "$PKG_VERSION" = "$TAG" || { echo "::error::Release tag '$GITHUB_REF_NAME' does not match src.__version__ '$PKG_VERSION'"; exit 1; }

    - name: Build package
      run: python -m build

    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
