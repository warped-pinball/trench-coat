name: Build Binaries

on:
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            add-data: "uf2:uf2"
            ext: ""
            python_arch: x64
          - os: windows-latest
            name: windows
            add-data: "uf2;uf2"
            ext: ".exe"
            python_arch: x64
          # Intel macOS runners (macos-13) are being retired and can leave the
          # job queued for hours, so build the x86_64 binary on an arm64 runner
          # using an x86_64 Python under Rosetta instead.
          - os: macos-15
            name: macos-x86_64
            add-data: "uf2:uf2"
            ext: ""
            python_arch: x64
          - os: macos-15
            name: macos-arm64
            add-data: "uf2:uf2"
            ext: ""
            python_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Rosetta is required to run the x86_64 Python on the arm64 runner.
      - name: Install Rosetta (x86_64 macOS build)
        if: matrix.name == 'macos-x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: ${{ matrix.python_arch }}

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean build dirs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          if (Test-Path build) { Remove-Item build -Recurse -Force }

      - name: Clean build dirs (Linux/macOS)
        if: runner.os != 'Windows'
        run: rm -rf dist build

      - name: Package with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
            --name TrenchCoat-${{ matrix.name }} \
            --hidden-import mpremote \
            --add-data "${{ matrix.add-data }}" \
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: TrenchCoat-${{ matrix.name }}
          path: dist/TrenchCoat-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  upload_release_assets:
    name: Upload Release Assets
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/TrenchCoat-linux/TrenchCoat-linux
            artifacts/TrenchCoat-macos-x86_64/TrenchCoat-macos-x86_64
            artifacts/TrenchCoat-macos-arm64/TrenchCoat-macos-arm64
            artifacts/TrenchCoat-windows/TrenchCoat-windows.exe
